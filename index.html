<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Xosting Tariflari</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --dark-color: #1e293b;
            --light-bg: #f8fafc;
            --white: #ffffff;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light-bg);
            color: var(--dark-color);
            margin: 0;
            padding: 0;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

        /* Header */
        .header { text-align: center; padding: 50px 0; background: var(--white); border-bottom: 1px solid var(--border-color); }
        .header h1 { margin: 0; font-size: 2rem; }
        .header p { color: #64748b; margin-top: 10px; }

        /* Navigation */
        .section-nav { display: flex; justify-content: center; gap: 15px; margin: 30px 0; }
        .section-nav button {
            padding: 12px 24px; border: 1px solid var(--border-color); background: var(--white);
            border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s;
        }
        .section-nav button.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }

        /* Tables */
        .pricing-section { display: none; }
        .pricing-section.active { display: block; }
        .table-container { background: var(--white); border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #f1f5f9; padding: 15px; font-size: 0.85rem; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; }

        .btn-buy {
            display: inline-block; padding: 8px 16px; background: var(--primary-color); color: white;
            text-decoration: none; border-radius: 6px; font-size: 0.85rem; font-weight: 600;
        }

        .duration-badge {
            font-size: 0.75rem; background: #e0e7ff; color: #4338ca;
            padding: 2px 8px; border-radius: 10px; margin-left: 5px; font-weight: 400;
        }

        /* Admin Panel Styles */
        #admin-gate { position: fixed; bottom: 5px; right: 5px; width: 15px; height: 15px; cursor: pointer; opacity: 0.05; background: black; border-radius: 50%; }
        #admin-panel {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 95%; max-width: 800px; background: white; padding: 25px; border-radius: 15px;
            box-shadow: 0 0 50px rgba(0,0,0,0.4); z-index: 1000; max-height: 85vh; overflow-y: auto;
        }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 999; }
        .admin-form-group { margin-bottom: 15px; background: #f9fafb; padding: 10px; border-radius: 8px; border: 1px solid #eee; }
        .admin-form-group label { display: block; margin-bottom: 5px; font-weight: 700; color: #1e293b; border-bottom: 1px solid #ddd; padding-bottom: 3px; }
        .admin-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; }
        .admin-inputs div { display: flex; flex-direction: column; }
        .admin-inputs span { font-size: 0.75rem; color: #64748b; margin-bottom: 2px; }
        .admin-inputs input { padding: 6px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 0.85rem; }
        .admin-actions { position: sticky; bottom: -25px; background: white; padding: 15px 0; display: flex; gap: 10px; border-top: 1px solid #eee; }
        .btn-admin { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; flex: 1; }
        .btn-save { background: #10b981; color: white; }
        .btn-close { background: #ef4444; color: white; }
    </style>
</head>
<body>

<header class="header">
    <div class="container">
        <h1>Xosting Xizmatlari</h1>
        <p>Ishonchli va tezkor serverlar — barcha tariflar 1 oylik muddat uchun</p>
    </div>
</header>

<div class="container">
    <div class="section-nav">
        <button id="btn-bot" class="active" onclick="toggleView('bot')">Bot Hosting</button>
        <button id="btn-site" onclick="toggleView('site')">Veb-sayt Hosting</button>
    </div>

    <div id="bot-section" class="pricing-section active">
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Tarif nomi</th><th>RAM</th><th>CPU</th><th>Disk</th><th>Narxi (1 oy)</th><th>Amal</th></tr>
                </thead>
                <tbody id="bot-tbody"></tbody>
            </table>
        </div>
    </div>

    <div id="site-section" class="pricing-section">
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Tarif nomi</th><th>Trafik</th><th>Disk</th><th>Saytlar</th><th>Narxi (1 oy)</th><th>Amal</th></tr>
                </thead>
                <tbody id="site-tbody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="admin-gate" onclick="openAdmin()"></div>

<div class="overlay" id="overlay" onclick="closeAdmin()"></div>
<div id="admin-panel">
    <h3>Boshqaruv Paneli</h3>
    
    <div id="login-section">
        <div class="admin-form-group">
            <label>Kirish paroli:</label>
            <input type="password" id="admin-pass-input" style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
        </div>
        <button class="btn-admin btn-save" onclick="checkLogin()">Kirish</button>
    </div>

    <div id="edit-section" style="display:none;">
        <div style="background: #fff4f4; padding: 10px; border-radius: 8px; margin-bottom: 20px;">
            <h4 style="margin:0 0 10px 0;">Parolni yangilash</h4>
            <input type="password" id="new-password" placeholder="Yangi parol" style="padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
            <button class="btn-admin btn-save" style="flex:none;" onclick="updatePassword()">Saqlash</button>
        </div>

        <h4>Tarif ma'lumotlarini tahrirlash</h4>
        <div id="editor-fields"></div>

        <div class="admin-actions">
            <button class="btn-admin btn-save" onclick="saveData()">Saqlash va Saytni Yangilash</button>
            <button class="btn-admin btn-close" onclick="closeAdmin()">Yopish</button>
        </div>
    </div>
</div>

<script>
    // Boshlang'ich ma'lumotlar (Free olib tashlangan)
    const initialBotData = [
        {name: "Starter", ram: "256 MB", cpu: "1%", disk: "1 GB", price: "24,990 So'm", time: "1 oy"},
        {name: "Basic", ram: "512 MB", cpu: "3%", disk: "2 GB", price: "49,990 So'm", time: "1 oy"},
        {name: "Pro Lite", ram: "768 MB", cpu: "5%", disk: "3 GB", price: "74,990 So'm", time: "1 oy"},
        {name: "Pro", ram: "1024 MB", cpu: "7%", disk: "5 GB", price: "99,990 So'm", time: "1 oy"},
        {name: "Premium Lite", ram: "2048 MB", cpu: "9%", disk: "7 GB", price: "149,990 So'm", time: "1 oy"},
        {name: "Premium", ram: "4096 MB", cpu: "11%", disk: "10 GB", price: "229,990 So'm", time: "1 oy"},
        {name: "Premium Pro", ram: "5120 MB", cpu: "15%", disk: "15 GB", price: "319,990 So'm", time: "1 oy"}
    ];

    const initialSiteData = [
        {name: "Starter", traffic: "15 GB", disk: "1 GB", sites: "1", price: "19,990 So'm", time: "1 oy"},
        {name: "Basic", traffic: "50 GB", disk: "2 GB", sites: "2", price: "49,990 So'm", time: "1 oy"},
        {name: "Pro Lite", traffic: "100 GB", disk: "5 GB", sites: "3", price: "89,990 So'm", time: "1 oy"},
        {name: "Pro", traffic: "250 GB", disk: "10 GB", sites: "5", price: "149,990 So'm", time: "1 oy"},
        {name: "Premium", traffic: "Unlimited", disk: "25 GB", sites: "8", price: "249,990 So'm", time: "1 oy"}
    ];

    let botData = JSON.parse(localStorage.getItem('botData')) || initialBotData;
    let siteData = JSON.parse(localStorage.getItem('siteData')) || initialSiteData;
    let adminPass = localStorage.getItem('adminPass') || 'admin123';

    function renderTables() {
        const botTbody = document.getElementById('bot-tbody');
        botTbody.innerHTML = botData.map(item => `
            <tr>
                <td><strong>${item.name}</strong> <span class="duration-badge">${item.time}</span></td>
                <td>${item.ram}</td>
                <td>${item.cpu}</td>
                <td>${item.disk}</td>
                <td style="color:#2563eb; font-weight:700;">${item.price}</td>
                <td><a href="https://t.me/Bot_Deploy" class="btn-buy">Sotib olish</a></td>
            </tr>
        `).join('');

        const siteTbody = document.getElementById('site-tbody');
        siteTbody.innerHTML = siteData.map(item => `
            <tr>
                <td><strong>${item.name}</strong> <span class="duration-badge">${item.time}</span></td>
                <td>${item.traffic}</td>
                <td>${item.disk}</td>
                <td>${item.sites}</td>
                <td style="color:#2563eb; font-weight:700;">${item.price}</td>
                <td><a href="https://t.me/Bot_Deploy" class="btn-buy">Sotib olish</a></td>
            </tr>
        `).join('');
    }

    function toggleView(type) {
        document.getElementById('bot-section').classList.toggle('active', type === 'bot');
        document.getElementById('site-section').classList.toggle('active', type === 'site');
        document.getElementById('btn-bot').classList.toggle('active', type === 'bot');
        document.getElementById('btn-site').classList.toggle('active', type === 'site');
    }

    function openAdmin() {
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('admin-panel').style.display = 'block';
    }

    function closeAdmin() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'none';
        document.getElementById('login-section').style.display = 'block';
        document.getElementById('edit-section').style.display = 'none';
    }

    function checkLogin() {
        const input = document.getElementById('admin-pass-input').value;
        if(input === adminPass) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('edit-section').style.display = 'block';
            renderEditor();
        } else {
            alert("Parol noto'g'ri!");
        }
    }

    function updatePassword() {
        const newP = document.getElementById('new-password').value;
        if(newP) {
            adminPass = newP;
            localStorage.setItem('adminPass', newP);
            alert('Parol yangilandi!');
        }
    }

    function renderEditor() {
        let html = '<h5 style="color:var(--primary-color)">🤖 Bot Hosting</h5>';
        botData.forEach((item, i) => {
            html += `
                <div class="admin-form-group">
                    <label>${item.name}</label>
                    <div class="admin-inputs">
                        <div><span>Vaqt</span><input type="text" id="b-time-${i}" value="${item.time}"></div>
                        <div><span>RAM</span><input type="text" id="b-ram-${i}" value="${item.ram}"></div>
                        <div><span>Disk</span><input type="text" id="b-disk-${i}" value="${item.disk}"></div>
                        <div><span>Narx</span><input type="text" id="b-price-${i}" value="${item.price}"></div>
                    </div>
                </div>`;
        });

        html += '<h5 style="color:var(--primary-color); margin-top:30px;">🌐 Sayt Hosting</h5>';
        siteData.forEach((item, i) => {
            html += `
                <div class="admin-form-group">
                    <label>${item.name}</label>
                    <div class="admin-inputs">
                        <div><span>Vaqt</span><input type="text" id="s-time-${i}" value="${item.time}"></div>
                        <div><span>Disk</span><input type="text" id="s-disk-${i}" value="${item.disk}"></div>
                        <div><span>Narx</span><input type="text" id="s-price-${i}" value="${item.price}"></div>
                    </div>
                </div>`;
        });
        document.getElementById('editor-fields').innerHTML = html;
    }

    function saveData() {
        botData.forEach((item, i) => {
            item.time = document.getElementById(`b-time-${i}`).value;
            item.ram = document.getElementById(`b-ram-${i}`).value;
            item.disk = document.getElementById(`b-disk-${i}`).value;
            item.price = document.getElementById(`b-price-${i}`).value;
        });
        siteData.forEach((item, i) => {
            item.time = document.getElementById(`s-time-${i}`).value;
            item.disk = document.getElementById(`s-disk-${i}`).value;
            item.price = document.getElementById(`s-price-${i}`).value;
        });
        localStorage.setItem('botData', JSON.stringify(botData));
        localStorage.setItem('siteData', JSON.stringify(siteData));
        renderTables();
        alert('Ma\'lumotlar saqlandi!');
    }

    renderTables();
</script>

</body>
</html>
